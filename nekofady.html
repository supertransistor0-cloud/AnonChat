var GITHUB_TOKEN = '';
var GIST_ID = '';
const FILE_NAME = 'chat.txt';
const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5МБ

var set = false;
let currentUser = '';
let currentSeed = '';
let refreshInterval = null;

// URL сервера, по умолчанию пустой
let serverUrl = '';

function updateServerUrl() {
  const urlInput = document.getElementById('serverUrl');
  serverUrl = urlInput.value.trim();
  if (!serverUrl) {
    alert('Пожалуйста, введите URL сервера');
  } else {
    alert('URL сервера обновлен');
  }
}

// Вход
function enterChat() {
  currentUser = document.getElementById('userName').value.trim();
  currentSeed = document.getElementById('seedPhrase').value.trim();
  GITHUB_TOKEN = document.getElementById('token').value.trim();
  GIST_ID = document.getElementById('gist').value.trim();

  if (!currentUser || !currentSeed || !GITHUB_TOKEN || !GIST_ID || !serverUrl) {
    return alert("Заполните все поля и укажите URL сервера");
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';

  document.getElementById('display-name').innerText = currentUser;

  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(loadMessages, 10000);
  loadMessages();
  set = true;
}

// Отправка сообщения
async function sendMessage() {
  const input = document.getElementById('msgInput');
  if (!input.value.trim()) return;

  const message = input.value.trim();
  const encrypted = CryptoJS.AES.encrypt(message, currentSeed).toString();

  if (!serverUrl) {
    alert('URL сервера не задан');
    return;
  }

  try {
    await fetch(serverUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: currentUser, message: encrypted })
    });
    input.value = '';
  } catch (err) {
    alert('Ошибка отправки: ' + err.message);
  }
}

        message: encryptedMessage
      })
    });
